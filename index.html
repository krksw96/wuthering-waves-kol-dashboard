<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>명조 플레이 데이터 보드</title>
    <style>
      :root {
        --bg: #eef1f7;
        --panel: rgba(246, 248, 252, 0.9);
        --panel-solid: #f7f9fc;
        --line: rgba(140, 165, 198, 0.46);
        --line-soft: rgba(169, 190, 218, 0.38);
        --text: #162235;
        --muted: #5e6980;
        --accent: #2c63ae;
        --accent-2: #4f8ad2;
        --gold: #d6b06f;
        --shadow: 0 24px 56px rgba(21, 36, 65, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(88, 137, 211, 0.24), transparent 32rem),
          radial-gradient(circle at bottom right, rgba(212, 176, 111, 0.2), transparent 30rem),
          var(--bg);
        color: var(--text);
        font-family:
          "SUIT Variable", "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", Arial, sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      a {
        color: inherit;
      }

      .page {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
      }

      .page::before {
        position: fixed;
        inset: 0;
        z-index: -2;
        background:
          linear-gradient(180deg, rgba(238, 243, 250, 0.78), rgba(234, 239, 247, 0.92)),
          url("images/anni-kv-bg.jpg") center top / cover;
        content: "";
        opacity: 1;
      }

      .page::after {
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(130deg, rgba(29, 56, 104, 0.1), transparent 40%),
          radial-gradient(circle at 1px 1px, rgba(38, 86, 151, 0.14) 1px, transparent 0);
        background-size:
          auto,
          24px 24px;
        content: "";
        pointer-events: none;
      }

      .wrap {
        width: min(1680px, calc(100% - 40px));
        margin: 0 auto;
        padding: 24px 0 34px;
      }

      .panel {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 20px;
      }

      .hero-main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 310px;
        gap: 24px;
        padding: 28px;
      }

      .kicker {
        margin: 0;
        color: #9a452f;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 16px;
        font-size: clamp(34px, 4vw, 56px);
        line-height: 1.08;
        letter-spacing: 0;
        font-family: "MaruBuri", "Noto Serif KR", Georgia, serif;
      }

      .intro {
        max-width: 760px;
        margin-bottom: 0;
        color: #4d5f7d;
        font-size: 16px;
        line-height: 1.75;
      }

      .summary-grid,
      .metric-grid {
        display: grid;
        gap: 14px;
      }

      .summary-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin-top: 26px;
      }

      .metric-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        margin: 20px 0;
      }

      .tile,
      .metric,
      .detail {
        border: 1px solid rgba(145, 169, 201, 0.42);
        border-radius: 8px;
        background: linear-gradient(180deg, rgba(251, 253, 255, 0.9), rgba(241, 245, 251, 0.86));
      }

      .tile {
        padding: 14px 16px;
      }

      .label {
        margin-bottom: 6px;
        color: #6d7f9f;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .tile-value {
        overflow: hidden;
        margin-bottom: 4px;
        font-size: 21px;
        font-weight: 800;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tile-detail {
        margin: 0;
        color: #7c8aa1;
        font-size: 12px;
      }

      .image-frame {
        position: relative;
        min-height: 250px;
        overflow: hidden;
        border: 1px solid rgba(140, 165, 198, 0.46);
        border-radius: 18px;
        background:
          linear-gradient(180deg, rgba(247, 250, 255, 0.92), rgba(227, 236, 249, 0.88)),
          radial-gradient(circle at 50% 18%, rgba(214, 176, 111, 0.26), transparent 18rem);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
      }

      .image-frame img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center bottom;
        padding: 14px;
      }

      .scene-frame {
        min-height: 340px;
        height: 340px;
        background:
          linear-gradient(180deg, rgba(241, 246, 254, 0.94), rgba(225, 235, 248, 0.9)),
          radial-gradient(circle at 50% 0%, rgba(227, 191, 126, 0.24), transparent 17rem);
      }

      .scene-frame img {
        object-position: center center;
      }

      .hero-figure {
        background:
          linear-gradient(180deg, rgba(250, 252, 255, 0.96), rgba(230, 238, 249, 0.9)),
          radial-gradient(circle at 50% 5%, rgba(227, 191, 126, 0.3), transparent 16rem);
      }

      .hero-figure img {
        padding: 0;
        object-position: center bottom;
        transform: translateY(12px);
      }

      .metric {
        padding: 20px;
        box-shadow: 0 12px 30px rgba(34, 61, 108, 0.08);
      }

      .metric-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .badge,
      .pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        font-weight: 800;
      }

      .badge {
        background: var(--accent);
        color: white;
        padding: 5px 10px;
        font-size: 12px;
      }

      .metric-value {
        overflow: hidden;
        margin: 18px 0 12px;
        font-size: 24px;
        font-weight: 800;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .pill {
        background: rgba(224, 237, 255, 0.9);
        color: #315f9a;
        padding: 7px 12px;
        font-size: 14px;
      }

      .content {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 380px;
        gap: 24px;
        align-items: start;
      }

      .table-head,
      .side-section {
        padding: 18px 20px;
      }

      .table-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid #e9d3bc;
      }

      .table-head h2,
      .side-section h2 {
        margin-bottom: 6px;
        font-size: 22px;
      }

      .small {
        margin: 0;
        color: #6a7890;
        font-size: 14px;
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .filter-btn,
      .head-btn {
        cursor: pointer;
        border: 1px solid rgba(145, 169, 201, 0.46);
        border-radius: 999px;
        background: rgba(250, 252, 255, 0.96);
        color: #496178;
        font-size: 12px;
        font-weight: 800;
        transition: 0.16s ease;
      }

      .filter-btn {
        padding: 8px 12px;
      }

      .head-btn {
        padding: 5px 9px;
      }

      .filter-btn:hover,
      .head-btn:hover {
        border-color: var(--accent-2);
        color: var(--accent);
      }

      .filter-btn.active,
      .head-btn.active {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .table-scroll {
        max-height: 760px;
        overflow: auto;
      }

      table {
        width: 100%;
        min-width: 980px;
        border-collapse: collapse;
        font-size: 14px;
      }

      thead {
        position: sticky;
        top: 0;
        z-index: 5;
        background: linear-gradient(180deg, rgba(210, 225, 246, 0.98), rgba(192, 211, 237, 0.98));
        color: #173153;
        box-shadow: 0 1px 0 rgba(67, 101, 156, 0.18);
      }

      th,
      td {
        padding: 16px 20px;
        border-top: 1px solid #efddc9;
        text-align: left;
        vertical-align: middle;
      }

      th.num,
      td.num {
        text-align: right;
      }

      tbody tr {
        transition: background 0.16s ease;
      }

      tbody tr:hover {
        background: rgba(225, 236, 252, 0.72);
      }

      .rank {
        color: var(--accent);
        font-weight: 800;
      }

      .kol-link {
        font-weight: 800;
        text-decoration: none;
        text-underline-offset: 4px;
      }

      .kol-link:hover {
        color: #9a452f;
        text-decoration: underline;
      }

      aside {
        position: sticky;
        top: 24px;
        display: grid;
        gap: 20px;
      }

      .search-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
      }

      .status {
        max-width: 180px;
        border: 1px solid rgba(127, 158, 203, 0.46);
        border-radius: 999px;
        background: rgba(228, 239, 255, 0.92);
        color: #315f9a;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 800;
      }

      label {
        display: block;
        margin-top: 18px;
        color: #5b3b2d;
        font-size: 14px;
        font-weight: 800;
      }

      input[type="search"] {
        width: 100%;
        margin-top: 8px;
        border: 1px solid rgba(145, 169, 201, 0.46);
        border-radius: 8px;
        outline: none;
        background: rgba(250, 252, 255, 0.96);
        padding: 13px 14px;
        color: var(--text);
      }

      input[type="search"]:focus {
        border-color: #4679c0;
        background: white;
        box-shadow: 0 0 0 3px rgba(114, 159, 223, 0.22);
      }

      .matches,
      .weekly-list {
        display: grid;
        gap: 8px;
        margin-top: 16px;
      }

      .match,
      .weekly-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        background: rgba(252, 254, 255, 0.9);
        padding: 11px 12px;
        color: inherit;
        text-decoration: none;
        transition: 0.16s ease;
      }

      .match.active,
      .match:hover,
      .weekly-item:hover {
        border-color: #6390cc;
        background: rgba(228, 239, 255, 0.84);
      }

      .match button {
        cursor: pointer;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: #8a6a54;
        padding: 5px 8px;
        font-size: 12px;
        font-weight: 800;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }

      .detail {
        padding: 12px;
      }

      .detail strong {
        display: block;
        margin-top: 4px;
      }

      .note {
        margin: 16px 0 0;
        border-radius: 8px;
        background: rgba(227, 239, 255, 0.92);
        color: #405773;
        padding: 13px 14px;
        font-size: 14px;
        line-height: 1.6;
      }

      .cup-frame {
        height: 280px;
      }

      .cup-frame img {
        padding: 6px 0 0;
      }

      .page-art {
        position: fixed;
        bottom: 0;
        z-index: 0;
        width: min(24vw, 360px);
        height: min(74vh, 760px);
        opacity: 0.22;
        pointer-events: none;
        filter: drop-shadow(0 28px 36px rgba(17, 34, 63, 0.15));
      }

      .page-art img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center bottom;
      }

      .art-left {
        left: -28px;
      }

      .art-right {
        right: -20px;
      }

      .weekly-item span:first-child {
        overflow: hidden;
        font-weight: 800;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .weekly-score {
        flex-shrink: 0;
        color: #9a452f;
        font-size: 12px;
        font-weight: 800;
      }

      @media (max-width: 1200px) {
        .hero,
        .hero-main,
        .content {
          grid-template-columns: 1fr;
        }

        aside {
          position: static;
        }

        .scene-frame {
          height: 260px;
        }

        .page-art {
          display: none;
        }
      }

      @media (max-width: 820px) {
        .wrap {
          width: min(100% - 28px, 1680px);
          padding-top: 14px;
        }

        .summary-grid,
        .metric-grid {
          grid-template-columns: 1fr;
        }

        .table-head {
          align-items: flex-start;
          flex-direction: column;
        }

        .filters {
          justify-content: flex-start;
        }

        h1 {
          font-size: 34px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="page-art art-left" aria-hidden="true">
        <img src="images/anni-denia.png" alt="" />
      </div>
      <div class="page-art art-right" aria-hidden="true">
        <img src="images/anni-hiyuki.png" alt="" />
      </div>
      <div class="wrap">
        <header class="hero">
          <section class="panel hero-main">
            <div>
              <p class="kicker">Wuthering Waves KOL Board</p>
              <h1>명조 플레이 데이터 보드</h1>
              <p class="intro">
                엑셀 파일의 명조 플레이 데이터를 KOL별로 정리해 플레이 횟수, 방송 시간, 시청 지표, 뷰어십 순위를 한 화면에서 확인합니다.
              </p>
              <div class="summary-grid">
                <div class="tile">
                  <div class="label">전체 KOL</div>
                  <div class="tile-value" id="summary-records">-</div>
                  <p class="tile-detail">records</p>
                </div>
                <div class="tile">
                  <div class="label">주간 기준</div>
                  <div class="tile-value" id="summary-week">-</div>
                  <p class="tile-detail">latest window</p>
                </div>
                <div class="tile">
                  <div class="label">정렬 기준</div>
                  <div class="tile-value" id="summary-sort">뷰어십</div>
                  <p class="tile-detail">ranking filter</p>
                </div>
              </div>
            </div>
            <div class="image-frame hero-figure">
              <img src="images/anni-aemeath.png" alt="" />
            </div>
          </section>
          <section class="panel">
            <div class="image-frame scene-frame">
              <img src="images/anni-sd-kv.jpg" alt="" />
            </div>
          </section>
        </header>

        <section class="metric-grid" id="metrics"></section>

        <section class="content">
          <section class="panel">
            <div class="table-head">
              <div>
                <h2>데이터 랭킹</h2>
                <p class="small">선택 기준: <strong id="active-label">뷰어십</strong> · <span id="record-count">0</span> records</p>
              </div>
              <div class="filters" id="filters"></div>
            </div>
            <div class="table-scroll">
              <table>
                <thead>
                  <tr>
                    <th><button class="head-btn active" data-key="viewership">Rank ↓</button></th>
                    <th>KOL</th>
                    <th class="num"><button class="head-btn active" data-key="viewership">Viewership ↓</button></th>
                    <th class="num"><button class="head-btn" data-key="streams">Play 筛选</button></th>
                    <th class="num"><button class="head-btn" data-key="playHours">Hours 筛选</button></th>
                    <th class="num"><button class="head-btn" data-key="maxViewers">Peak 筛选</button></th>
                    <th class="num"><button class="head-btn" data-key="avgViewers">Average 筛选</button></th>
                    <th class="num"><button class="head-btn" data-key="youtube">YouTube 筛选</button></th>
                    <th class="num"><button class="head-btn" data-key="latest">Latest 筛选</button></th>
                  </tr>
                </thead>
                <tbody id="ranking-body"></tbody>
              </table>
            </div>
          </section>

          <aside>
            <section class="panel side-section">
              <div class="search-top">
                <div>
                  <p class="kicker">KOL Search</p>
                  <h2>상세 정보</h2>
                </div>
                <span class="status">Excel snapshot loaded</span>
              </div>
              <label>
                이름 검색
                <input id="query" type="search" placeholder="예: 다주, 소니쇼, 탬탬버린" />
              </label>
              <div class="matches" id="matches"></div>
            </section>

            <section class="panel side-section" id="selected-panel"></section>

            <section class="panel">
              <div class="image-frame cup-frame">
                <img src="images/anni-hiyuki.png" alt="" />
              </div>
              <div class="side-section">
                <p class="kicker">Weekly Ranking</p>
                <h2>주간 TOP 6</h2>
                <p class="small" id="weekly-label">-</p>
                <div class="weekly-list" id="weekly-list"></div>
              </div>
            </section>
          </aside>
        </section>
      </div>
    </main>

    <script src="data/kol-data.js"></script>
    <script>
      const records = Array.isArray(window.KOL_RECORDS) ? window.KOL_RECORDS : [];
      const labels = {
        viewership: "뷰어십",
        streams: "플레이 횟수",
        playHours: "방송 시간",
        maxViewers: "최고 시청자",
        avgViewers: "평균 시청자",
        youtube: "유튜브",
        latest: "최근 방송",
      };
      const filterKeys = ["viewership", "streams", "playHours", "maxViewers", "avgViewers", "youtube", "latest"];
      let rankingKey = "viewership";
      let query = "";

      const ranked = [...records].sort((a, b) => {
        if (a.viewershipRank && b.viewershipRank) return a.viewershipRank - b.viewershipRank;
        return (b.viewershipTotal || b.avgViewers || 0) - (a.viewershipTotal || a.avgViewers || 0);
      });

      const weekly = getWeeklyRanking(records, ranked);

      function format(value) {
        return Number(value || 0).toLocaleString();
      }

      function youtubeHref(record) {
        const candidates = [record.youtube, record.youtubeAvgViews].filter(Boolean);
        const direct = candidates.find((value) => /^https?:\/\//i.test(value));
        if (direct) return direct;
        const youtubePath = candidates.find((value) => /(?:youtube\.com|youtu\.be)/i.test(value));
        if (youtubePath) return youtubePath.startsWith("http") ? youtubePath : `https://${youtubePath}`;
        return `https://www.youtube.com/results?search_query=${encodeURIComponent(`${record.creator} 유튜브`)}`;
      }

      function parseCompactNumber(value) {
        if (!value) return 0;
        const normalized = String(value).trim().toLowerCase();
        const numeric = Number(normalized.replace(/[^0-9.]/g, ""));
        if (!Number.isFinite(numeric)) return 0;
        if (normalized.includes("w") || normalized.includes("만")) return numeric * 10000;
        if (normalized.includes("k")) return numeric * 1000;
        return numeric;
      }

      function parseRecordDate(record) {
        const match = String(record.latestDate || "").match(/(\d{1,2})\.(\d{1,2})/);
        if (!match) return null;
        const year = record.updatedAt ? new Date(record.updatedAt).getFullYear() : new Date().getFullYear();
        return new Date(year, Number(match[1]) - 1, Number(match[2]));
      }

      function formatMonthDay(date) {
        return `${String(date.getMonth() + 1).padStart(2, "0")}.${String(date.getDate()).padStart(2, "0")}`;
      }

      function getWeeklyRanking(source, fallback) {
        const dated = source
          .map((record) => ({ record, date: parseRecordDate(record) }))
          .filter((item) => item.date);
        if (!dated.length) return { label: "최근 주차", records: fallback.slice(0, 6) };
        const latest = new Date(Math.max(...dated.map((item) => item.date.getTime())));
        const start = new Date(latest);
        start.setDate(start.getDate() - 6);
        const weeklyRecords = dated
          .filter((item) => item.date >= start && item.date <= latest)
          .map((item) => item.record)
          .sort((a, b) => (b.viewershipTotal || b.avgViewers || 0) - (a.viewershipTotal || a.avgViewers || 0));
        return {
          label: `${formatMonthDay(start)}-${formatMonthDay(latest)}`,
          records: weeklyRecords.length ? weeklyRecords : fallback.slice(0, 6),
        };
      }

      function sortByKey(source, key) {
        const valueOf = (record) => {
          if (key === "viewership") return record.viewershipTotal || record.avgViewers || 0;
          if (key === "streams") return record.streams || 0;
          if (key === "playHours") return record.playHours || 0;
          if (key === "maxViewers") return record.maxViewers || 0;
          if (key === "avgViewers") return record.avgViewers || 0;
          if (key === "youtube") return parseCompactNumber(record.youtubeAvgViews || record.youtube);
          return parseRecordDate(record)?.getTime() || 0;
        };
        return [...source].sort((a, b) => {
          const delta = valueOf(b) - valueOf(a);
          if (delta !== 0) return delta;
          return (b.viewershipTotal || 0) - (a.viewershipTotal || 0);
        });
      }

      function renderMetrics() {
        const topBy = (key) => [...records].sort((a, b) => Number(b[key] || 0) - Number(a[key] || 0))[0] || {};
        const metrics = [
          ["01", "가장 많이 플레이", topBy("streams").creator || "-", `${topBy("streams").streams || 0}회`],
          ["02", "가장 오래 플레이", topBy("playHours").creator || "-", `${topBy("playHours").playHours || 0}시간`],
          ["03", "최고 시청자", topBy("maxViewers").creator || "-", `${format(topBy("maxViewers").maxViewers)}명`],
          ["04", "평균 시청자", topBy("avgViewers").creator || "-", `${format(topBy("avgViewers").avgViewers)}명`],
        ];
        document.getElementById("metrics").innerHTML = metrics
          .map(
            ([badge, label, value, detail]) => `
              <article class="metric">
                <div class="metric-head"><div class="label">${label}</div><span class="badge">${badge}</span></div>
                <div class="metric-value">${value}</div>
                <span class="pill">${detail}</span>
              </article>
            `,
          )
          .join("");
      }

      function renderFilters() {
        document.getElementById("filters").innerHTML = filterKeys
          .map((key) => `<button class="filter-btn ${rankingKey === key ? "active" : ""}" data-key="${key}">${labels[key]}</button>`)
          .join("");
      }

      function renderTable() {
        const rows = sortByKey(records, rankingKey);
        document.getElementById("ranking-body").innerHTML = rows
          .map(
            (record, index) => `
              <tr>
                <td class="rank">${index + 1}</td>
                <td><a class="kol-link" href="${youtubeHref(record)}" target="_blank" rel="noreferrer">${record.creator}</a></td>
                <td class="num"><strong>${format(record.viewershipTotal)}</strong></td>
                <td class="num">${format(record.streams)}</td>
                <td class="num">${record.playHours || 0}</td>
                <td class="num">${format(record.maxViewers)}</td>
                <td class="num">${format(record.avgViewers)}</td>
                <td class="num">${record.youtubeAvgViews || record.youtube || "-"}</td>
                <td class="num">${record.latestDate || new Date(record.updatedAt).toLocaleDateString("ko-KR")}</td>
              </tr>
            `,
          )
          .join("");
      }

      function renderMatches() {
        const normalized = query.trim().toLowerCase();
        const matches = (normalized ? ranked.filter((record) => record.creator.toLowerCase().includes(normalized)) : ranked).slice(0, 8);
        const selected = normalized ? matches[0] : ranked[0];
        document.getElementById("matches").innerHTML = matches.length
          ? matches
              .map(
                (record) => `
                  <div class="match ${selected && selected.creator === record.creator ? "active" : ""}">
                    <a class="kol-link" href="${youtubeHref(record)}" target="_blank" rel="noreferrer">${record.creator}</a>
                    <button type="button" data-name="${record.creator}">#${record.viewershipRank}</button>
                  </div>
                `,
              )
              .join("")
          : `<p class="small">검색 결과가 없습니다.</p>`;
        renderSelected(selected);
      }

      function renderSelected(record) {
        if (!record) {
          document.getElementById("selected-panel").innerHTML = "";
          return;
        }
        document.getElementById("selected-panel").innerHTML = `
          <div class="side-section">
            <div class="search-top">
              <div>
                <p class="kicker">Selected KOL</p>
                <h2><a class="kol-link" href="${youtubeHref(record)}" target="_blank" rel="noreferrer">${record.creator}</a></h2>
              </div>
              <span class="badge">Rank ${record.viewershipRank}</span>
            </div>
            <div class="detail-grid">
              <div class="detail"><div class="label">플레이</div><strong>${format(record.streams)}회</strong></div>
              <div class="detail"><div class="label">방송 시간</div><strong>${record.playHours || 0}시간</strong></div>
              <div class="detail"><div class="label">최고 시청자</div><strong>${format(record.maxViewers)}명</strong></div>
              <div class="detail"><div class="label">평균 시청자</div><strong>${format(record.avgViewers)}명</strong></div>
              <div class="detail"><div class="label">누적 뷰어십</div><strong>${format(record.viewershipTotal)}</strong></div>
              <div class="detail"><div class="label">최근 방송</div><strong>${record.latestDate || "-"}</strong></div>
            </div>
            <p class="note">${record.notes || "최근 업로드 영상 중심"}</p>
          </div>
        `;
      }

      function renderWeekly() {
        document.getElementById("weekly-label").textContent = weekly.label;
        document.getElementById("weekly-list").innerHTML = weekly.records
          .slice(0, 6)
          .map(
            (record, index) => `
              <a class="weekly-item" href="${youtubeHref(record)}" target="_blank" rel="noreferrer">
                <span>${index + 1}. ${record.creator}</span>
                <span class="weekly-score">${format(record.viewershipTotal)}</span>
              </a>
            `,
          )
          .join("");
      }

      function updateSort(key) {
        rankingKey = key;
        document.getElementById("summary-sort").textContent = labels[rankingKey];
        document.getElementById("active-label").textContent = labels[rankingKey];
        renderFilters();
        document.querySelectorAll(".head-btn").forEach((button) => {
          const active = button.dataset.key === rankingKey;
          button.classList.toggle("active", active);
          const base = button.textContent.replace(" ↓", "").replace(" 筛选", "");
          button.textContent = active ? `${base} ↓` : `${base} 筛选`;
        });
        renderTable();
      }

      document.addEventListener("click", (event) => {
        const key = event.target.dataset?.key;
        if (key && labels[key]) updateSort(key);
        const name = event.target.dataset?.name;
        if (name) {
          query = name;
          document.getElementById("query").value = name;
          renderMatches();
        }
      });

      document.getElementById("query").addEventListener("input", (event) => {
        query = event.target.value;
        renderMatches();
      });

      document.getElementById("summary-records").textContent = format(records.length);
      document.getElementById("summary-week").textContent = weekly.label;
      document.getElementById("record-count").textContent = format(records.length);

      renderMetrics();
      renderFilters();
      renderTable();
      renderMatches();
      renderWeekly();
    </script>
  </body>
</html>
