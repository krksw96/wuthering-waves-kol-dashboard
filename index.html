<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>명조 플레이 데이터 보드</title>
        <style>
      :root {
        --bg: #f7f6fb;
        --panel: rgba(255, 255, 255, 0.82);
        --panel-strong: rgba(255, 255, 255, 0.92);
        --panel-solid: #ffffff;
        --line: rgba(168, 171, 226, 0.36);
        --line-soft: rgba(191, 198, 241, 0.24);
        --text: #17233b;
        --muted: #61708d;
        --accent: #5b67d7;
        --accent-2: #4fa7ea;
        --accent-3: #ef7db1;
        --accent-4: #9b7dff;
        --gold: #e6bc72;
        --rose: #f8d6e7;
        --sky: #d9e8ff;
        --shadow: 0 28px 80px rgba(62, 71, 129, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(147, 183, 255, 0.38), transparent 30rem),
          radial-gradient(circle at 82% 14%, rgba(255, 179, 215, 0.28), transparent 22rem),
          radial-gradient(circle at bottom right, rgba(173, 148, 255, 0.22), transparent 28rem),
          var(--bg);
        color: var(--text);
        font-family:
          "SUIT Variable", "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", Arial, sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      a {
        color: inherit;
      }

      .page {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
      }

      .page::before {
        position: fixed;
        inset: 0;
        z-index: -3;
        background:
          linear-gradient(180deg, rgba(252, 247, 255, 0.78), rgba(243, 246, 255, 0.94)),
          url("images/anni-kv-bg.jpg") center top / cover;
        content: "";
      }

      .page::after {
        position: fixed;
        inset: 0;
        z-index: -2;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.18), transparent 38%),
          radial-gradient(circle at 1px 1px, rgba(123, 132, 231, 0.12) 1px, transparent 0),
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0));
        background-size:
          auto,
          26px 26px,
          auto;
        content: "";
        pointer-events: none;
      }

      .wrap {
        position: relative;
        z-index: 1;
        width: min(1720px, calc(100% - 40px));
        margin: 0 auto;
        padding: 24px 0 34px;
      }

      .panel {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 30px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(246, 248, 255, 0.84)),
          var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        isolation: isolate;
      }

      .panel::before {
        position: absolute;
        inset: 0;
        border: 1px solid rgba(255, 255, 255, 0.62);
        border-radius: 30px;
        content: "";
        pointer-events: none;
      }

      .panel::after {
        position: absolute;
        inset: 12px;
        border: 1px solid rgba(153, 167, 246, 0.14);
        border-radius: 22px;
        content: "";
        pointer-events: none;
      }

      .hero {
        display: block;
      }

      .hero-main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 340px;
        gap: 24px;
        padding: 30px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.88), rgba(248, 244, 255, 0.74) 52%, rgba(236, 245, 255, 0.82)),
          rgba(255, 255, 255, 0.82);
      }

      .hero-main::before {
        position: absolute;
        top: -40px;
        left: -30px;
        width: 280px;
        height: 280px;
        background: radial-gradient(circle, rgba(255, 182, 218, 0.3), transparent 70%);
        content: "";
        pointer-events: none;
      }

      .hero-main::after {
        position: absolute;
        right: 250px;
        bottom: -70px;
        width: 320px;
        height: 320px;
        background: radial-gradient(circle, rgba(110, 170, 255, 0.22), transparent 72%);
        content: "";
        pointer-events: none;
      }

      .hero-copy {
        position: relative;
        z-index: 1;
      }

      .hero-copy::before {
        position: absolute;
        top: -4px;
        left: 0;
        width: 110px;
        height: 4px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent-3), var(--accent-2));
        content: "";
      }

      .kicker {
        margin: 0;
        color: #d45e8f;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        margin: 14px 0 16px;
        font-size: clamp(38px, 4.6vw, 62px);
        line-height: 1.04;
        letter-spacing: -0.03em;
        font-family: "MaruBuri", "Noto Serif KR", Georgia, serif;
        text-shadow: 0 10px 26px rgba(255, 255, 255, 0.46);
      }

      h1 .gradient {
        background: linear-gradient(110deg, #2f498d 0%, #5867da 38%, #c864aa 76%, #f39cc9 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .intro {
        max-width: 780px;
        margin-bottom: 0;
        color: #4f5f7f;
        font-size: 16px;
        line-height: 1.8;
      }

      .summary-grid,
      .metric-grid {
        display: grid;
        gap: 14px;
      }
      .idol-chip {
        position: relative;
        min-height: 148px;
        overflow: hidden;
        border: 1px solid rgba(167, 170, 235, 0.34);
        border-radius: 24px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(244, 241, 255, 0.76)),
          rgba(255, 255, 255, 0.84);
        padding: 16px 16px 18px;
        box-shadow: 0 16px 44px rgba(95, 101, 179, 0.12);
      }

      .idol-chip::before {
        position: absolute;
        inset: 10px;
        border: 1px solid rgba(158, 170, 239, 0.16);
        border-radius: 18px;
        content: "";
        pointer-events: none;
      }

      .idol-chip::after {
        position: absolute;
        top: 14px;
        right: 14px;
        width: 54px;
        height: 54px;
        border-radius: 16px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.66), rgba(255, 255, 255, 0));
        content: "";
        pointer-events: none;
      }

      .idol-chip-copy {
        position: relative;
        z-index: 1;
        max-width: 58%;
      }

      .idol-chip span {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        background: rgba(248, 227, 239, 0.9);
        color: #cb5e8f;
        padding: 5px 10px;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .idol-chip strong {
        display: block;
        margin-top: 12px;
        font-size: 18px;
        line-height: 1.35;
        letter-spacing: -0.02em;
      }

      .idol-chip p {
        margin: 8px 0 0;
        color: #697997;
        font-size: 12px;
        line-height: 1.55;
      }

      .idol-chip img {
        position: absolute;
        right: -16px;
        bottom: -2px;
        width: 124px;
        height: 124px;
        object-fit: contain;
        object-position: center bottom;
        filter: drop-shadow(0 18px 22px rgba(81, 88, 165, 0.18));
      }

      .idol-chip-sd img {
        right: -24px;
        bottom: -18px;
        width: 174px;
        height: 150px;
        opacity: 0.96;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin-top: 18px;
      }

      .metric-grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        margin: 26px 0 0;
      }

      .tile,
      .metric,
      .detail {
        position: relative;
        border: 1px solid rgba(166, 175, 239, 0.34);
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(244, 247, 255, 0.82));
      }

      .tile::before,
      .metric::before,
      .detail::before,
      .table-head::before,
      .side-section::before {
        position: absolute;
        inset: 10px;
        border: 1px solid rgba(161, 175, 241, 0.14);
        border-radius: 18px;
        content: "";
        pointer-events: none;
      }

      .tile::after,
      .metric::after,
      .detail::after {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 34px;
        height: 34px;
        border-top: 2px solid rgba(240, 130, 185, 0.34);
        border-right: 2px solid rgba(94, 145, 236, 0.28);
        border-radius: 0 16px 0 0;
        content: "";
        pointer-events: none;
      }

      .tile {
        padding: 16px 18px;
        box-shadow: 0 14px 32px rgba(84, 98, 179, 0.08);
      }

      .label {
        margin-bottom: 6px;
        color: #7481b3;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .tile-value {
        overflow: hidden;
        margin-bottom: 4px;
        font-size: 22px;
        font-weight: 900;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tile-detail {
        margin: 0;
        color: #8390a9;
        font-size: 12px;
      }

      .image-frame {
        position: relative;
        min-height: 250px;
        overflow: hidden;
        border: 1px solid rgba(164, 173, 243, 0.34);
        border-radius: 30px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(234, 240, 255, 0.82)),
          radial-gradient(circle at 50% 18%, rgba(245, 176, 216, 0.22), transparent 18rem);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
        isolation: isolate;
      }

      .image-frame::before {
        position: absolute;
        inset: 14px;
        border: 1px solid rgba(168, 177, 244, 0.18);
        border-radius: 22px;
        content: "";
        pointer-events: none;
      }

      .image-frame::after {
        position: absolute;
        inset: auto auto 20px 20px;
        width: 120px;
        height: 120px;
        background: radial-gradient(circle, rgba(94, 145, 236, 0.16), transparent 72%);
        content: "";
        pointer-events: none;
      }

      .image-frame img {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center bottom;
        padding: 14px;
      }

      .hero-figure {
        background:
          linear-gradient(180deg, rgba(255, 249, 255, 0.98), rgba(233, 239, 255, 0.92)),
          radial-gradient(circle at 50% 10%, rgba(239, 125, 177, 0.22), transparent 16rem);
      }

      .hero-figure::after {
        inset: auto auto 10px 14px;
        width: 180px;
        height: 180px;
        background: radial-gradient(circle, rgba(245, 137, 188, 0.22), transparent 72%);
      }

      .hero-figure img {
        padding: 0;
        object-fit: cover;
        object-position: center top;
        transform: translateY(0);
      }

      .side-figure {
        height: 420px;
      }

      .side-figure img {
        padding: 0;
        object-fit: cover;
        object-position: center top;
      }

      .metric {
        padding: 22px 22px 20px;
        min-width: 0;
        box-shadow: 0 18px 36px rgba(84, 98, 179, 0.1);
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      }

      .metric:hover,
      .tile:hover,
      .detail:hover {
        transform: translateY(-3px);
        border-color: rgba(112, 132, 236, 0.42);
        box-shadow: 0 22px 42px rgba(84, 98, 179, 0.14);
      }

      .metric-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .badge,
      .pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        font-weight: 900;
      }

      .badge {
        background: linear-gradient(135deg, var(--accent-3), var(--accent));
        color: white;
        padding: 6px 11px;
        font-size: 12px;
        box-shadow: 0 8px 18px rgba(110, 95, 222, 0.22);
      }

      .metric-value {
        overflow: hidden;
        margin: 18px 0 12px;
        font-size: 25px;
        font-weight: 900;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .pill {
        background: linear-gradient(135deg, rgba(232, 242, 255, 0.96), rgba(249, 228, 240, 0.92));
        color: #4662ac;
        padding: 7px 12px;
        font-size: 14px;
        border: 1px solid rgba(160, 178, 240, 0.28);
      }

      .metric .pill {
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .content {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 390px;
        gap: 24px;
        align-items: start;
      }

      .table-head,
      .side-section {
        position: relative;
        padding: 20px 22px;
      }

      .table-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 112px;
        overflow: hidden;
        border-bottom: 1px solid rgba(225, 211, 255, 0.7);
        background: linear-gradient(135deg, rgba(255, 247, 252, 0.72), rgba(239, 245, 255, 0.74));
      }

      .table-title {
        position: relative;
        z-index: 1;
        min-width: 0;
      }

      .table-head h2,
      .side-section h2 {
        margin-bottom: 6px;
        font-size: 24px;
        letter-spacing: -0.02em;
      }

      .small {
        margin: 0;
        color: #6c7a96;
        font-size: 14px;
      }

      .head-btn {
        cursor: pointer;
        border: 1px solid rgba(164, 173, 243, 0.4);
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(243, 246, 255, 0.9));
        color: #506381;
        font-size: 12px;
        font-weight: 900;
        transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, color 0.18s ease, background 0.18s ease;
      }

      .head-btn {
        padding: 6px 10px;
      }

      .head-btn:hover {
        transform: translateY(-1px);
        border-color: rgba(101, 122, 233, 0.8);
        color: var(--accent);
        box-shadow: 0 10px 20px rgba(95, 108, 212, 0.12);
      }

      .head-btn.active {
        border-color: rgba(101, 122, 233, 0.96);
        background: linear-gradient(135deg, rgba(94, 111, 229, 0.96), rgba(239, 125, 177, 0.94));
        color: #fff;
      }

      .ranking-art {
        position: absolute;
        right: 18px;
        bottom: -22px;
        z-index: 0;
        width: min(440px, 48%);
        height: 134px;
        overflow: hidden;
        border-radius: 22px 22px 0 0;
        opacity: 0.96;
        pointer-events: none;
        filter: saturate(1.05) drop-shadow(0 18px 26px rgba(79, 90, 173, 0.13));
      }

      .ranking-art img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
      }

      .table-scroll {
        min-height: 0;
        overflow: auto;
      }

      table {
        width: 100%;
        min-width: 980px;
        border-collapse: collapse;
        font-size: 14px;
      }

      thead {
        position: sticky;
        top: 0;
        z-index: 5;
        background: linear-gradient(135deg, rgba(234, 241, 255, 0.98), rgba(250, 232, 243, 0.98));
        color: #1d3055;
        box-shadow: 0 1px 0 rgba(96, 112, 206, 0.16);
      }

      th,
      td {
        padding: 16px 20px;
        border-top: 1px solid rgba(226, 223, 247, 0.78);
        text-align: left;
        vertical-align: middle;
      }

      th.num,
      td.num {
        text-align: right;
      }

      tbody tr {
        position: relative;
        transition: background 0.18s ease, transform 0.18s ease;
      }

      .ranking-row {
        cursor: pointer;
      }

      tbody tr:hover {
        background: linear-gradient(90deg, rgba(235, 243, 255, 0.82), rgba(255, 236, 245, 0.72));
      }

      tbody tr.ranking-row.selected {
        background: linear-gradient(90deg, rgba(229, 238, 255, 0.96), rgba(255, 230, 244, 0.92));
        box-shadow: inset 4px 0 0 rgba(99, 119, 234, 0.78);
      }

      tbody tr.ranking-row:focus-visible {
        outline: 3px solid rgba(101, 122, 233, 0.42);
        outline-offset: -5px;
      }

      tbody tr:nth-child(-n + 3) {
        background: linear-gradient(90deg, rgba(255, 248, 238, 0.9), rgba(255, 240, 250, 0.75));
      }

      tbody tr:nth-child(1) {
        background: linear-gradient(90deg, rgba(255, 245, 221, 0.95), rgba(255, 230, 244, 0.85));
      }

      tbody tr:nth-child(2) {
        background: linear-gradient(90deg, rgba(242, 245, 255, 0.95), rgba(255, 236, 245, 0.8));
      }

      tbody tr:nth-child(3) {
        background: linear-gradient(90deg, rgba(251, 240, 230, 0.92), rgba(244, 236, 255, 0.82));
      }

      .rank {
        color: var(--accent);
        font-weight: 900;
      }

      tbody tr:nth-child(-n + 3) .rank {
        color: #c46b2f;
      }

      .kol-link {
        font-weight: 900;
        text-decoration: none;
        text-underline-offset: 4px;
      }

      .kol-link:hover {
        color: #c64e8a;
        text-decoration: underline;
      }

      .table-kol {
        display: inline;
        border: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
        padding: 0;
        text-align: left;
      }

      aside {
        position: sticky;
        top: 24px;
        display: grid;
        gap: 20px;
      }

      .search-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
      }

      label {
        display: block;
        margin-top: 18px;
        color: #6c4f74;
        font-size: 14px;
        font-weight: 900;
      }

      input[type="search"] {
        width: 100%;
        margin-top: 8px;
        border: 1px solid rgba(165, 176, 243, 0.42);
        border-radius: 18px;
        outline: none;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(246, 248, 255, 0.92));
        padding: 14px 16px;
        color: var(--text);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }

      input[type="search"]:focus {
        border-color: #6678e5;
        background: white;
        box-shadow: 0 0 0 4px rgba(120, 140, 232, 0.16);
      }

      .matches {
        display: grid;
        gap: 10px;
        margin-top: 16px;
      }

      .match {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border: 1px solid var(--line-soft);
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(245, 247, 255, 0.88));
        padding: 12px 13px;
        color: inherit;
        text-decoration: none;
        transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      }

      .match {
        width: 100%;
        cursor: pointer;
        appearance: none;
        font: inherit;
        text-align: left;
      }

      .match.active,
      .match:hover {
        transform: translateY(-2px);
        border-color: rgba(99, 119, 234, 0.52);
        background: linear-gradient(135deg, rgba(237, 244, 255, 0.92), rgba(255, 238, 247, 0.88));
        box-shadow: 0 14px 28px rgba(95, 108, 212, 0.1);
      }

      .match-rank {
        flex-shrink: 0;
        border-radius: 999px;
        background: rgba(244, 228, 239, 0.94);
        color: #bf5c89;
        padding: 6px 9px;
        font-size: 12px;
        font-weight: 900;
      }

      .match-name {
        overflow: hidden;
        font-weight: 900;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .selected-shell {
        min-height: 420px;
        background:
          linear-gradient(135deg, rgba(255, 251, 255, 0.94), rgba(239, 244, 255, 0.9)),
          rgba(255, 255, 255, 0.86);
      }

      .hero-main .selected-shell {
        min-height: 0;
        align-self: stretch;
      }

      .hero-main .selected-card {
        height: 100%;
      }

      .selected-card {
        position: relative;
        overflow: hidden;
      }

      .selected-card::before {
        position: absolute;
        top: -10px;
        right: -34px;
        width: 220px;
        height: 280px;
        background: radial-gradient(circle, rgba(244, 124, 180, 0.18), transparent 72%);
        content: "";
        pointer-events: none;
      }

      .selected-hero {
        position: relative;
        display: grid;
        grid-template-columns: 1fr 124px;
        gap: 14px;
        align-items: center;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(223, 226, 249, 0.86);
      }

      .selected-visual {
        position: relative;
        height: 132px;
        overflow: hidden;
        border: 1px solid rgba(164, 173, 243, 0.3);
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(255, 251, 255, 0.96), rgba(234, 241, 255, 0.9));
      }

      .selected-visual::before {
        position: absolute;
        inset: 10px;
        border: 1px solid rgba(161, 175, 241, 0.14);
        border-radius: 14px;
        content: "";
        pointer-events: none;
      }

      .selected-visual img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }

      .detail {
        padding: 13px;
        box-shadow: 0 10px 24px rgba(84, 98, 179, 0.08);
      }

      .detail strong {
        display: block;
        margin-top: 5px;
      }

      .note {
        position: relative;
        margin: 16px 0 0;
        border-radius: 18px;
        background: linear-gradient(135deg, rgba(233, 241, 255, 0.96), rgba(251, 235, 243, 0.94));
        color: #405773;
        padding: 14px 15px;
        font-size: 14px;
        line-height: 1.7;
        border: 1px solid rgba(162, 176, 241, 0.2);
      }

      .page-art {
        position: fixed;
        bottom: 0;
        z-index: 0;
        width: min(25vw, 390px);
        height: min(78vh, 820px);
        opacity: 0.28;
        pointer-events: none;
        filter: drop-shadow(0 28px 36px rgba(42, 51, 116, 0.14));
      }

      .page-art img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center bottom;
      }

      .art-left {
        left: -36px;
      }

      .art-right {
        right: -24px;
      }

      @media (max-width: 1200px) {
        .hero,
        .hero-main,
        .content {
          grid-template-columns: 1fr;
        }

        .side-figure {
          height: 360px;
        }

        aside {
          position: static;
        }

        .page-art {
          display: none;
        }

        .metric-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 820px) {
        .wrap {
          width: min(100% - 28px, 1680px);
          padding-top: 14px;
        }

        .summary-grid,
        .detail-grid,
        .selected-hero {
          grid-template-columns: 1fr;
        }

        .table-head {
          align-items: flex-start;
          flex-direction: column;
          min-height: 170px;
        }

        .ranking-art {
          right: 12px;
          bottom: -18px;
          width: min(520px, calc(100% - 24px));
          height: 92px;
        }

        h1 {
          font-size: 36px;
        }

        .hero-main,
        .table-head,
        .side-section {
          padding: 18px;
        }

        .panel,
        .image-frame,
        .tile,
        .metric,
        .detail,
        .match,
        input[type="search"],
        .note {
          border-radius: 20px;
        }

        .idol-chip img {
          width: 110px;
          height: 110px;
        }

        .idol-chip-sd img {
          width: 150px;
          height: 128px;
        }

        .metric-grid {
          grid-template-columns: 1fr;
        }
      }
    

      .hero-copy > * {
        position: relative;
        z-index: 1;
      }

      .summary-grid {
        margin-top: 28px;
      }

      .search-panel .matches,
      .search-panel label,
      .search-panel .search-top {
        position: relative;
        z-index: 1;
      }

      .ranking-panel {
        display: flex;
        flex-direction: column;
        height: var(--ranking-panel-height, 620px);
        overflow: hidden;
      }

      .ranking-panel .table-scroll {
        flex: 1;
        min-height: 0;
      }

      @media (max-width: 1200px) {
        .ranking-panel {
          height: auto;
          overflow: visible;
        }

        .ranking-panel .table-scroll {
          max-height: 760px;
        }
      }

    </style>
  </head>
  <body>
    <main class="page">
      <div class="page-art art-left" aria-hidden="true">
        <img src="images/anni-denia-close.png" alt="" />
      </div>
      <div class="page-art art-right" aria-hidden="true">
        <img src="images/anni-hiyuki-close.png" alt="" />
      </div>
      <div class="wrap">
        <header class="hero">
          <section class="panel hero-main">
            <div class="hero-copy">
              <p class="kicker">Wuthering Waves KOL Board</p>
              <h1><span class="gradient">KOL play data</span></h1>
              <p class="intro">
                KOL들의 명조 플레이 데이터를 한눈에 볼 수 있고, 업데이트 주기는 매일 업데이트되며 데이터들을 빠르게 비교할 수 있어요.
              </p>
              <div class="summary-grid">
                <div class="tile">
                  <div class="label">전체 KOL</div>
                  <div class="tile-value" id="summary-records">-</div>
                  <p class="tile-detail">&#xD06C;&#xB9AC;&#xC5D0;&#xC774;&#xD130; &#xC218;</p>
                </div>
                <div class="tile">
                  <div class="label">주간 기준</div>
                  <div class="tile-value" id="summary-week">-</div>
                  <p class="tile-detail">&#xCD5C;&#xC2E0; &#xC9D1;&#xACC4; &#xAD6C;&#xAC04;</p>
                </div>
              </div>
              <section class="metric-grid" id="metrics"></section>
            </div>
            <section class="panel side-section selected-shell" id="selected-panel"></section>
          </section>
        </header>

        <section class="content">
          <section class="panel ranking-panel">
            <div class="table-head">
              <div class="table-title">
                <h2>&#xB370;&#xC774;&#xD130; &#xB7AD;&#xD0B9;</h2>
                <p class="small">&#xC120;&#xD0DD; &#xAE30;&#xC900;: <strong id="active-label">&#xBDF0;&#xC5B4;&#xC2ED;</strong> | <span id="record-count">0</span>&#xAC1C;</p>
              </div>
              <div class="ranking-art" aria-hidden="true">
                <img src="images/ranking-header-art.png" alt="" loading="lazy" decoding="async" />
              </div>
            </div>
            <div class="table-scroll">
              <table>
                <thead>
                  <tr>
                    <th><button class="head-btn active" data-key="viewership">&#xC21C;&#xC704; v</button></th>
                    <th>KOL</th>
                    <th class="num"><button class="head-btn active" data-key="viewership">&#xBDF0;&#xC5B4;&#xC2ED; v</button></th>
                    <th class="num"><button class="head-btn" data-key="streams">&#xD50C;&#xB808;&#xC774; &#xD69F;&#xC218;</button></th>
                    <th class="num"><button class="head-btn" data-key="playHours">&#xBC29;&#xC1A1; &#xC2DC;&#xAC04;</button></th>
                    <th class="num"><button class="head-btn" data-key="maxViewers">&#xCD5C;&#xACE0; &#xC2DC;&#xCCAD;&#xC790;</button></th>
                    <th class="num"><button class="head-btn" data-key="avgViewers">&#xD3C9;&#xADE0; &#xC2DC;&#xCCAD;&#xC790;</button></th>
                    <th class="num"><button class="head-btn" data-key="youtube">&#xC720;&#xD29C;&#xBE0C;</button></th>
                    <th class="num"><button class="head-btn" data-key="latest">&#xCD5C;&#xADFC; &#xBC29;&#xC1A1;</button></th>
                  </tr>
                </thead>
                <tbody id="ranking-body"></tbody>
              </table>
            </div>
          </section>

          <aside>
            <section class="panel side-section search-panel">
              <div class="search-top">
                <div>
                  <p class="kicker">KOL Search</p>
                  <h2>상세 정보</h2>
                </div>
              </div>
              <label>
                이름 검색
                <input id="query" type="search" placeholder="예: 다주, 소니쇼, 탬탬버린" />
              </label>
              <div class="matches" id="matches"></div>
            </section>

            <div class="image-frame side-figure">
              <img src="images/anni-aemeath-close.png" alt="" />
            </div>

          </aside>
        </section>
      </div>
    </main>

    <script>document.write('<script src="data/kol-data.js?v=' + Date.now() + '"><\/script>');</script>
    <script>
      const records = Array.isArray(window.KOL_RECORDS) ? window.KOL_RECORDS : [];
      const labels = {
        viewership: "뷰어십",
        streams: "플레이 횟수",
        playHours: "방송 시간",
        maxViewers: "최고 시청자",
        avgViewers: "평균 시청자",
        youtube: "유튜브",
        latest: "최근 방송",
      };
      let rankingKey = "viewership";
      let query = "";
      let selectedCreator = "";

      const ranked = [...records].sort((a, b) => {
        if (a.viewershipRank && b.viewershipRank) return a.viewershipRank - b.viewershipRank;
        return (b.viewershipTotal || b.avgViewers || 0) - (a.viewershipTotal || a.avgViewers || 0);
      });

      const weekly = getWeeklyRanking(records, ranked);
      selectedCreator = ranked[0]?.creator || "";

      function format(value) {
        return Number(value || 0).toLocaleString();
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        })[char]);
      }

      function youtubeHref(record) {
        const candidates = [record.youtubeUrl, record.youtube, record.youtubeAvgViews].filter(Boolean);
        const direct = candidates.find((value) => /^https?:\/\//i.test(value));
        if (direct) return direct;
        const youtubePath = candidates.find((value) => /(?:youtube\.com|youtu\.be)/i.test(value));
        if (youtubePath) return youtubePath.startsWith("http") ? youtubePath : `https://${youtubePath}`;
        return `https://www.youtube.com/results?search_query=${encodeURIComponent(`${record.creator} 유튜브`)}`;
      }

      function parseCompactNumber(value) {
        if (!value) return 0;
        const normalized = String(value).trim().toLowerCase();
        const numeric = Number(normalized.replace(/[^0-9.]/g, ""));
        if (!Number.isFinite(numeric)) return 0;
        if (normalized.includes("w") || normalized.includes("만")) return numeric * 10000;
        if (normalized.includes("k")) return numeric * 1000;
        return numeric;
      }

      function parseRecordDate(record) {
        const match = String(record.latestDate || "").match(/(\d{1,2})\.(\d{1,2})/);
        if (!match) return null;
        const year = record.updatedAt ? new Date(record.updatedAt).getFullYear() : new Date().getFullYear();
        return new Date(year, Number(match[1]) - 1, Number(match[2]));
      }

      function formatMonthDay(date) {
        return `${String(date.getMonth() + 1).padStart(2, "0")}.${String(date.getDate()).padStart(2, "0")}`;
      }

      function getWeeklyRanking(source, fallback) {
        const dated = source
          .map((record) => ({ record, date: parseRecordDate(record) }))
          .filter((item) => item.date);
        if (!dated.length) return { label: "최근 주차", records: fallback.slice(0, 6) };
        const latest = new Date(Math.max(...dated.map((item) => item.date.getTime())));
        const start = new Date(latest);
        start.setDate(start.getDate() - 6);
        const weeklyRecords = dated
          .filter((item) => item.date >= start && item.date <= latest)
          .map((item) => item.record)
          .sort((a, b) => (b.viewershipTotal || b.avgViewers || 0) - (a.viewershipTotal || a.avgViewers || 0));
        return {
          label: `${formatMonthDay(start)}-${formatMonthDay(latest)}`,
          records: weeklyRecords.length ? weeklyRecords : fallback.slice(0, 6),
        };
      }

      function sortByKey(source, key) {
        const valueOf = (record) => {
          if (key === "viewership") return record.viewershipTotal || record.avgViewers || 0;
          if (key === "streams") return record.streams || 0;
          if (key === "playHours") return record.playHours || 0;
          if (key === "maxViewers") return record.maxViewers || 0;
          if (key === "avgViewers") return record.avgViewers || 0;
          if (key === "youtube") return parseCompactNumber(record.youtubeAvgViews || record.youtube);
          return parseRecordDate(record)?.getTime() || 0;
        };
        return [...source].sort((a, b) => {
          const delta = valueOf(b) - valueOf(a);
          if (delta !== 0) return delta;
          return (b.viewershipTotal || 0) - (a.viewershipTotal || 0);
        });
      }

      function renderMetrics() {
        const weeklySource = weekly.records.length ? weekly.records : ranked;
        const topBy = (key) => sortByKey(weeklySource, key)[0] || {};
        const topViewership = topBy("viewership");
        const topStreams = topBy("streams");
        const topHours = topBy("playHours");
        const topMax = topBy("maxViewers");
        const topAvg = topBy("avgViewers");
        const metrics = [
          ["1등", "주간 뷰어십", topViewership.creator || "-", `${format(topViewership.viewershipTotal)} 뷰어십`],
          ["1등", "주간 플레이 횟수", topStreams.creator || "-", `${format(topStreams.streams)}회`],
          ["1등", "주간 방송 시간", topHours.creator || "-", `${format(topHours.playHours)}시간`],
          ["1등", "주간 최고 시청자", topMax.creator || "-", `${format(topMax.maxViewers)}명`],
          ["1등", "주간 평균 시청자", topAvg.creator || "-", `${format(topAvg.avgViewers)}명`],
        ];
        document.getElementById("metrics").innerHTML = metrics
          .map(
            ([badge, label, value, detail]) => `
              <article class="metric">
                <div class="metric-head"><div class="label">${escapeHtml(label)}</div><span class="badge">${escapeHtml(badge)}</span></div>
                <div class="metric-value">${escapeHtml(value)}</div>
                <span class="pill">${escapeHtml(detail)}</span>
              </article>
            `,
          )
          .join("");
      }

      function renderTable() {
        const rows = sortByKey(records, rankingKey);
        document.getElementById("ranking-body").innerHTML = rows
          .map(
            (record, index) => `
              <tr class="ranking-row ${selectedCreator === record.creator ? "selected" : ""}" data-ranking-name="${escapeHtml(record.creator)}" tabindex="0" aria-label="${escapeHtml(record.creator)} 선택">
                <td class="rank">${index + 1}</td>
                <td><a class="kol-link table-kol" href="${youtubeHref(record)}" target="_blank" rel="noreferrer" aria-label="${escapeHtml(record.creator)} 유튜브 열기">${escapeHtml(record.creator)}</a></td>
                <td class="num"><strong>${format(record.viewershipTotal)}</strong></td>
                <td class="num">${format(record.streams)}</td>
                <td class="num">${record.playHours || 0}</td>
                <td class="num">${format(record.maxViewers)}</td>
                <td class="num">${format(record.avgViewers)}</td>
                <td class="num">${record.youtubeAvgViews || record.youtube || "-"}</td>
                <td class="num">${record.latestDate || new Date(record.updatedAt).toLocaleDateString("ko-KR")}</td>
              </tr>
            `,
          )
          .join("");
      }

      function renderMatches() {
        const normalized = query.trim().toLowerCase();
        const matches = (normalized ? ranked.filter((record) => record.creator.toLowerCase().includes(normalized)) : ranked).slice(0, 3);
        if (!ranked.some((record) => record.creator === selectedCreator)) {
          selectedCreator = ranked[0]?.creator || "";
        }
        const selected = ranked.find((record) => record.creator === selectedCreator) || matches[0] || ranked[0];
        document.getElementById("matches").innerHTML = matches.length
          ? matches
              .map(
                (record) => `
                  <button type="button" class="match ${selected && selected.creator === record.creator ? "active" : ""}" data-name="${escapeHtml(record.creator)}" aria-pressed="${selected && selected.creator === record.creator ? "true" : "false"}">
                    <span class="match-name">${escapeHtml(record.creator)}</span>
                    <span class="match-rank">#${escapeHtml(record.viewershipRank)}</span>
                  </button>
                `,
              )
              .join("")
          : `<p class="small">검색 결과가 없습니다.</p>`;
        renderSelected(selected);
      }

      function selectCreator(name) {
        if (!name || selectedCreator === name) return;
        selectedCreator = name;
        renderTable();
        renderMatches();
      }

      function fallbackPortraitForRecord(record) {
        const portraits = [
          "images/anni-aemeath-close.png",
          "images/anni-denia-close.png",
          "images/anni-hiyuki-close.png",
        ];
        const seed = String(record.creator || "").split("").reduce((total, char) => total + char.charCodeAt(0), 0);
        return portraits[seed % portraits.length];
      }

      function portraitForRecord(record) {
        return record.profileImageUrl || fallbackPortraitForRecord(record);
      }

      function renderSelected(record) {
        if (!record) {
          document.getElementById("selected-panel").innerHTML = "";
          syncRankingHeight();
          return;
        }
        document.getElementById("selected-panel").innerHTML = `
          <div class="side-section selected-card">
            <div class="selected-hero">
              <div>
                <p class="kicker">&#xC120;&#xD0DD;&#xB41C; KOL</p>
                <h2><a class="kol-link" href="${youtubeHref(record)}" target="_blank" rel="noreferrer">${record.creator}</a></h2>
                <p class="small">&#xAC00;&#xC7A5; &#xCD5C;&#xADFC; &#xB370;&#xC774;&#xD130; &#xAE30;&#xC900; &#xD575;&#xC2EC; &#xBC29;&#xC1A1; &#xC9C0;&#xD45C;&#xB97C; &#xD55C;&#xB208;&#xC5D0; &#xBCFC; &#xC218; &#xC788;&#xC5B4;.</p>
              </div>
              <div class="selected-visual">
                <img src="${portraitForRecord(record)}" alt="${record.creator} 프로필 이미지" loading="lazy" decoding="async" onerror="this.onerror=null;this.src='${fallbackPortraitForRecord(record)}';" />
              </div>
            </div>
            <div class="search-top">
              <span class="pill">&#xBDF0;&#xC5B4;&#xC2ED; &#xC0C1;&#xC704;</span>
              <span class="badge">Rank ${record.viewershipRank}</span>
            </div>
            <div class="detail-grid">
              <div class="detail"><div class="label">&#xD50C;&#xB808;&#xC774; &#xD69F;&#xC218;</div><strong>${format(record.streams)}&#xD68C;</strong></div>
              <div class="detail"><div class="label">&#xBC29;&#xC1A1; &#xC2DC;&#xAC04;</div><strong>${record.playHours || 0}&#xC2DC;&#xAC04;</strong></div>
              <div class="detail"><div class="label">&#xCD5C;&#xACE0; &#xC2DC;&#xCCAD;&#xC790;</div><strong>${format(record.maxViewers)}&#xBA85;</strong></div>
              <div class="detail"><div class="label">&#xD3C9;&#xADE0; &#xC2DC;&#xCCAD;&#xC790;</div><strong>${format(record.avgViewers)}&#xBA85;</strong></div>
              <div class="detail"><div class="label">&#xBDF0;&#xC5B4;&#xC2ED;</div><strong>${format(record.viewershipTotal)}</strong></div>
              <div class="detail"><div class="label">&#xCD5C;&#xADFC; &#xBC29;&#xC1A1;</div><strong>${record.latestDate || "-"}</strong></div>
            </div>
            <p class="note">${record.notes || "&#xCD5C;&#xADFC; &#xC5C5;&#xB85C;&#xB4DC;&#xC640; &#xD50C;&#xB808;&#xC774; &#xC911;&#xC2EC; &#xBC29;&#xC1A1; &#xB0B4;&#xC6A9; &#xC694;&#xC57D;"}</p>
          </div>
        `;
        syncRankingHeight();
      }

      function syncRankingHeight() {
        const rankingPanel = document.querySelector(".ranking-panel");
        const sidePanel = document.querySelector(".content aside");
        if (!rankingPanel || !sidePanel) return;
        if (window.matchMedia("(max-width: 1200px)").matches) {
          rankingPanel.style.removeProperty("--ranking-panel-height");
          return;
        }
        const height = Math.ceil(sidePanel.getBoundingClientRect().height);
        if (height > 0) {
          rankingPanel.style.setProperty("--ranking-panel-height", `${height}px`);
        }
      }

      function updateSort(key) {
        rankingKey = key;
        document.getElementById("active-label").textContent = labels[rankingKey];
        document.querySelectorAll(".head-btn").forEach((button) => {
          const active = button.dataset.key === rankingKey;
          button.classList.toggle("active", active);
          const base = button.textContent.replace(" v", "");
          button.textContent = active ? `${base} v` : base;
        });
        renderTable();
      }

      document.addEventListener("click", (event) => {
        const sortControl = event.target.closest("[data-key]");
        const key = sortControl?.dataset?.key;
        if (key && labels[key]) updateSort(key);
        if (event.target.closest("a.table-kol")) return;
        const rankingControl = event.target.closest("[data-ranking-name]");
        const rankingName = rankingControl?.dataset?.rankingName;
        if (rankingName) {
          selectCreator(rankingName);
          return;
        }
        const matchControl = event.target.closest("[data-name]");
        const name = matchControl?.dataset?.name;
        if (name) {
          selectCreator(name);
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        if (event.target.closest("a.table-kol")) return;
        const rankingControl = event.target.closest("[data-ranking-name]");
        const rankingName = rankingControl?.dataset?.rankingName;
        if (!rankingName) return;
        event.preventDefault();
        selectCreator(rankingName);
      });

      document.getElementById("query").addEventListener("input", (event) => {
        query = event.target.value;
        renderMatches();
      });

      window.addEventListener("resize", syncRankingHeight);

      document.getElementById("summary-records").textContent = format(records.length);
      document.getElementById("summary-week").textContent = weekly.label;
      document.getElementById("record-count").textContent = format(records.length);

      renderMetrics();
      renderTable();
      renderMatches();
    </script>
  </body>
